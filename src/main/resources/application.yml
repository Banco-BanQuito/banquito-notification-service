spring:
  application:
    name: notification-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/routingdb}
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8089}

grpc:
  server:
    port: ${GRPC_PORT:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

banquito:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3003,http://localhost:5173,http://localhost:8010}
  notification:
    from: ${SMTP_FROM:no-reply@banquito.local}
    smtp-enabled: ${SMTP_ENABLED:false}
    audit-enabled: ${NOTIFICATION_AUDIT_ENABLED:true}
